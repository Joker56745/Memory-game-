<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memory Game</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  font-family: system-ui, -apple-system, sans-serif;
}

h1 {
  margin-top: 25px;
  font-size: 2.4rem;
}

.controls {
  margin: 15px;
}

/* 🔥 кнопки */
button {
  padding: 10px 16px;
  margin: 6px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  color: black;
  font-weight: 600;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-2px);
  opacity: 0.9;
}

/* 🔥 сетка */
.grid {
  display: grid;
  gap: 12px;
  margin-top: 20px;
}

/* 🔥 карточки */
.card {
  width: 85px;
  height: 85px;
  background: #1e293b;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.25s;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* hover эффект */
.card:hover {
  transform: scale(1.05);
}

/* открытая */
.card.flipped {
  background: linear-gradient(135deg, #4facfe, #00f2fe);
}

/* найденная */
.card.matched {
  background: #00ff9d;
  color: black;
  transform: scale(1.03);
  box-shadow: 0 0 15px rgba(0,255,157,0.6);
}

/* текст */
p {
  margin: 5px;
  opacity: 0.85;
}
</style>
</head>

<body>

<h1>🧠 Memory Game</h1>

<p>⏱ Time: <span id="time">0</span>s</p>
<p>🏆 Best: <span id="best">-</span>s</p>

<div class="controls">
  <button onclick="startGame(4)">4x4</button>
  <button onclick="startGame(6)">6x6</button>
  <button onclick="resetGame()">🔄 Reset</button>
</div>

<div class="grid" id="grid"></div>

<script>
let icons = ["🍎","🚀","🎮","🐶","🔥","⚽","🎧","🍕","🐱","🌈","🚗","🎵","🍔","🌟","🎲","📱","💎","🌍"];

let cards = [];
let first = null;
let second = null;
let lock = false;

let timer = 0;
let interval = null;
let size = 4;

function startGame(n) {
  size = n;
  const grid = document.getElementById("grid");

  let total = n * n / 2;
  let selected = icons.slice(0, total);
  cards = [...selected, ...selected];

  cards.sort(() => Math.random() - 0.5);

  grid.innerHTML = "";
  grid.style.gridTemplateColumns = `repeat(${n}, 80px)`;

  resetState();
  startTimer();

  cards.forEach(icon => {
    let div = document.createElement("div");
    div.className = "card";
    div.dataset.icon = icon;
    div.innerText = "";

    div.onclick = () => flip(div);

    grid.appendChild(div);
  });
}

function flip(card) {
  if (lock || card.classList.contains("flipped") || card.classList.contains("matched")) return;

  card.innerText = card.dataset.icon;
  card.classList.add("flipped");

  if (!first) {
    first = card;
    return;
  }

  second = card;
  lock = true;

  if (first.dataset.icon === second.dataset.icon) {
    first.classList.add("matched");
    second.classList.add("matched");
    reset();
    checkWin();
  } else {
    setTimeout(() => {
      first.innerText = "";
      second.innerText = "";
      first.classList.remove("flipped");
      second.classList.remove("flipped");
      reset();
    }, 700);
  }
}

function reset() {
  first = null;
  second = null;
  lock = false;
}

function checkWin() {
  let all = document.querySelectorAll(".card");
  let matched = document.querySelectorAll(".matched");

  if (all.length === matched.length) {
    stopTimer();
    saveBest();
    setTimeout(() => alert("🎉 You win!"), 200);
  }
}

function startTimer() {
  timer = 0;
  document.getElementById("time").innerText = timer;

  clearInterval(interval);
  interval = setInterval(() => {
    timer++;
    document.getElementById("time").innerText = timer;
  }, 1000);
}

function stopTimer() {
  clearInterval(interval);
}

function saveBest() {
  let best = localStorage.getItem("bestTime");

  if (!best || timer < best) {
    localStorage.setItem("bestTime", timer);
  }

  document.getElementById("best").innerText = localStorage.getItem("bestTime");
}

function loadBest() {
  let best = localStorage.getItem("bestTime");
  if (best) document.getElementById("best").innerText = best;
}

function resetState() {
  first = null;
  second = null;
  lock = false;
}

function resetGame() {
  startGame(size);
}

loadBest();
startGame(4);
</script>

</body>
</html>
