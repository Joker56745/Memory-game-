<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memory Game Pro</title>

<style>
body {
  background: radial-gradient(circle at top, #1e293b, #020617);
  color: white;
  text-align: center;
  font-family: Arial;
}

h1 {
  margin-top: 20px;
  font-size: 2.5rem;
}

.controls button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #4facfe;
  color: white;
  transition: 0.2s;
}

.controls button:hover {
  transform: scale(1.05);
}

.grid {
  display: grid;
  gap: 10px;
  justify-content: center;
  margin-top: 20px;
}

.card {
  width: 80px;
  height: 80px;
  perspective: 1000px;
}

.inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.5s;
}

.flipped .inner {
  transform: rotateY(180deg);
}

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  backface-visibility: hidden;
}

.front {
  background: #1e293b;
}

.back {
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  transform: rotateY(180deg);
}

.matched .back {
  background: #00ff9d;
  transform: scale(1.05);
}
</style>
</head>

<body>

<h1>🧠 Memory Game</h1>

<p>⏱ Time: <span id="time">0</span>s</p>
<p>🏆 Best: <span id="best">-</span>s</p>

<div class="controls">
  <button onclick="startGame(4)">4x4</button>
  <button onclick="startGame(6)">6x6</button>
  <button onclick="resetGame()">🔄 Reset</button>
</div>

<div class="grid" id="grid"></div>

<!-- 🔊 sounds -->
<audio id="flipSound" src="https://assets.mixkit.co/sfx/preview/mixkit-click-1120.mp3"></audio>
<audio id="winSound" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"></audio>

<script>
let icons = ["🍎","🚀","🎮","🐶","🔥","⚽","🎧","🍕","🐱","🌈","🚗","🎵","🍔","🌟","🎲","📱","💎","🌍"];

let first = null;
let second = null;
let lock = false;

let timer = 0;
let interval = null;

let size = 4;

function startGame(n) {
  size = n;
  let total = n * n / 2;

  let selected = icons.slice(0, total);
  let cards = [...selected, ...selected];

  cards.sort(() => Math.random() - 0.5);

  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  grid.style.gridTemplateColumns = `repeat(${n}, 80px)`;

  resetState();
  startTimer();

  cards.forEach(icon => {
    let card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="inner">
        <div class="front"></div>
        <div class="back">${icon}</div>
      </div>
    `;

    card.dataset.icon = icon;
    card.onclick = () => flip(card);

    grid.appendChild(card);
  });
}

function flip(card) {
  if (lock || card.classList.contains("flipped")) return;

  document.getElementById("flipSound").play();

  card.classList.add("flipped");

  if (!first) {
    first = card;
  } else {
    second = card;
    lock = true;

    if (first.dataset.icon === second.dataset.icon) {
      first.classList.add("matched");
      second.classList.add("matched");

      checkWin();
      reset();
    } else {
      setTimeout(() => {
        first.classList.remove("flipped");
        second.classList.remove("flipped");
        reset();
      }, 700);
    }
  }
}

function reset() {
  first = null;
  second = null;
  lock = false;
}

function checkWin() {
  let all = document.querySelectorAll(".card");
  let matched = document.querySelectorAll(".matched");

  if (all.length === matched.length) {
    stopTimer();
    document.getElementById("winSound").play();
    saveBest();
    setTimeout(() => alert("🎉 You win!"), 300);
  }
}

function startTimer() {
  timer = 0;
  document.getElementById("time").innerText = timer;

  clearInterval(interval);
  interval = setInterval(() => {
    timer++;
    document.getElementById("time").innerText = timer;
  }, 1000);
}

function stopTimer() {
  clearInterval(interval);
}

function saveBest() {
  let best = localStorage.getItem("bestTime");

  if (!best || timer < best) {
    localStorage.setItem("bestTime", timer);
  }

  document.getElementById("best").innerText = localStorage.getItem("bestTime");
}

function loadBest() {
  let best = localStorage.getItem("bestTime");
  if (best) document.getElementById("best").innerText = best;
}

function resetState() {
  first = null;
  second = null;
  lock = false;
}

function resetGame() {
  startGame(size);
}

loadBest();
startGame(4);
</script>

</body>
</html>
